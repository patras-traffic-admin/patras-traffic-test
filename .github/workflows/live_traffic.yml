name: Cloud Traffic Bot (Sandbox)

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pandas requests openpyxl

    - name: Run Traffic Bot
      env:
        TOMTOM_API_KEYS: ${{ secrets.TOMTOM_API_KEYS }}
      run: |
        python cloud_bot.py

    - name: Save CSV to GitHub
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add cloud_test_data.csv
        git commit -m "🤖 Auto-update Live Data" || echo "No changes to commit"
        git push
